<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden border border-slate-200 p-6">
    <div class="flex items-center gap-4">
        <div class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center text-white text-xl font-bold">
            {{ initials }}
        </div>
        <div>
            <h2 class="text-lg font-bold text-slate-800">{{ name }}</h2>
            <p class="text-xs text-slate-500">{{ role }}</p>
        </div>
    </div>
    
    <div class="mt-6 border-t border-slate-100 pt-4">
        <div class="text-xs text-slate-500 font-mono">
            <strong>Email:</strong> {{ email }}
        </div>
        <div class="text-xs text-slate-500 font-mono mt-1">
            <strong>Ciudad:</strong> {{ city }}
        </div>
    </div>
</div>
